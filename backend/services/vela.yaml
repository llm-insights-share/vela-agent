screenpilot:
  enabled: true
  # headless 可通过环境变量 SCREENPILOT_HEADLESS=false 覆盖
  headless: true
  # 会话闲置回收（秒），亦可用 SCREENPILOT_INACTIVITY_TIMEOUT
  inactivity_timeout: 300
  # CDP 默认地址：系统开启「复用本地浏览器」且未单独填写 cdp_url 时使用
  # 亦可用环境变量 SCREENPILOT_CDP_URL 覆盖
  cdp_url: "http://127.0.0.1:9222"
  # Vision 兜底模型（cu_vision）：SCREENPILOT_VISION_MODEL_SERVICE_ID 或 SCREENPILOT_VISION_MODEL_NAME
  # 站点风控文案 / 登录步骤不要写进引擎代码：
  # - ScreenSystem.risk_rules: block_url_substrings / block_body_hints / block_message / recovery_hint
  # - ScreenSystem.login_macro: goto/fill/click/wait_for_otp（见 examples/system_config_examples.py）
